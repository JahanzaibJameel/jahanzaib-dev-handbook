[book]
title = "Jahanzaib Dev Handbook - World-Class Developer Portfolio"
authors = ["Muhammad Jahanzaib"]
language = "en"
src = "src"
description = "Ultra-premium, FAANG-level developer handbook and portfolio showcasing world-class technical expertise"

[build]
build-dir = "book"

[output.html]
default-theme = "dark"
preferred-dark-theme = "coal"
git-repository-url = "https://github.com/JahanzaibJameel/jahanzaib-dev-handbook"
edit-url-template = "https://github.com/JahanzaibJameel/jahanzaib-dev-handbook/edit/main/{path}"
site-url = "https://jahanzaibjameel.github.io/jahanzaib-dev-handbook"

# Advanced animations and interactions
additional-css = ["advanced-animations.css"]
additional-js = ["advanced-interactions.js"]

# Premium sidebar navigation
sidebar-header-nav = true

# Premium search
[output.html.search]
enable = true
limit-results = 50

# Premium folding
[output.html.fold]
enable = true
level = 3

# Premium print
[output.html.print]
enable = true
page-break = true
