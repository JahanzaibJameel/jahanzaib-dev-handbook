[book]
title = "Jahanzaib Dev Handbook - World-Class Developer Portfolio"
authors = ["Muhammad Jahanzaib"]
language = "en"
src = "src"
description = "Ultra-premium, FAANG-level developer handbook and portfolio showcasing world-class technical expertise"

[build]
build-dir = "book"

[output.html]
default-theme = "none"
preferred-dark-theme = "none"
git-repository-url = "https://github.com/JahanzaibJameel/jahanzaib-dev-handbook"
edit-url-template = "https://github.com/JahanzaibJameel/jahanzaib-dev-handbook/edit/main/{path}"
# site-url = "/"  # Commented out for local development
hash-files = false

# DevAtelier 2026 - Premium theme assets
additional-css = [
    "theme/css/tokens.css",
    "theme/css/base.css",
    "theme/css/layout.css",
    "theme/css/components.css",
    "theme/css/animations.css",
    "theme/css/syntax.css",
    "theme/css/utilities.css"
]
additional-js = [
    "theme/js/core.js",
    "theme/js/animations.js",
    "theme/js/search.js"
]

# Premium sidebar navigation
sidebar-header-nav = true

# Premium search
[output.html.search]
enable = true
limit-results = 50

# Premium folding
[output.html.fold]
enable = true
level = 3

# Premium print
[output.html.print]
enable = true
page-break = true

# Copy code plugin
[preprocessor.copy-code]
command = "mdbook-copy-code"
optional = true
