name: Deploy mdBook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mdBook
        run: |
          curl -L https://github.com/rust-lang/mdBook/releases/download/v0.4.37/mdbook-v0.4.37-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv mdbook /usr/local/bin/

      - name: Verify mdBook installation
        run: mdbook --version

      - name: Build the book
        run: mdbook build

      - name: Add custom domain
        run: echo "yourusername.github.io" > book/CNAME

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
          force_orphan: true

      - name: Setup Node.js for additional tools
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install additional tools
        run: |
          npm install -g markdownlint-cli
          npm install -g alex

      - name: Run markdown linting
        run: |
          markdownlint "src/**/*.md" || true
          alex "src/**/*.md" || true

      - name: Generate sitemap
        run: |
          find book -name "*.html" | sed 's|^book/||' | sed 's|index\.html||' > book/sitemap.txt

      - name: Check for broken links
        run: |
          npm install -g markdown-link-check
          find src -name "*.md" -exec markdown-link-check {} \; || true
