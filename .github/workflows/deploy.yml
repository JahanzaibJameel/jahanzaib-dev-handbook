name: Deploy mdBook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Set permissions for the job
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mdBook
        run: |
          curl -L https://github.com/rust-lang/mdBook/releases/download/v0.4.37/mdbook-v0.4.37-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv mdbook /usr/local/bin/

      - name: Verify mdBook installation
        run: mdbook --version

      - name: Build book
        run: mdbook build

      - name: Setup Node.js for additional tools
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install additional tools
        run: |
          npm install -g markdownlint-cli
          npm install -g alex

      - name: Run markdown linting
        run: |
          markdownlint "src/**/*.md" || true
          alex "src/**/*.md" || true

      - name: Generate sitemap
        run: |
          find book -name "*.html" | sed 's|^book/||' | sed 's|index\.html||' > book/sitemap.txt

      - name: Check for broken links
        run: |
          npm install -g markdown-link-check
          find src -name "*.md" -exec markdown-link-check {} \; || true

      - name: Setup Pages
        uses: actions/configure-pages@v3
        if: github.ref == 'refs/heads/main'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: ./book

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
        if: github.ref == 'refs/heads/main'
